<!DOCTYPE html>
<html>
<head>
<title>For My Love ❤️</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:#1F3A93;
color:black;
font-family:Segoe UI;
}

h1{
font-size:70px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 40px pink;}
}

.falling-item{
position:fixed;
top:-10px;
font-size:22px;
pointer-events:none;
animation: fall linear forwards;
}

@keyframes fall{

0%{
transform: translateY(-10vh) rotate(0deg);
opacity:1;
}

100%{
transform: translateY(110vh) rotate(360deg);
opacity:0.8;
}

}

</style>
</head>

<body>

<div>

<h1>Hello My Footballer ❤️
</h1>

<p style="color: wheat;">I made a website for your birthday... I hope you love it <br> click on the button below</p>

<a href="story.html" class="btn" 
   style="border-radius:50px; border:2px solid #4169E1; background:transparent; color: white; padding:15px 40px; font-size:20px; font-weight:bold;">
   Surprise ✨
</a>

</div>

<script>

function createFalling(){

const items = ["❤️","🌸","💖","🌹","🌺","💐"];

let element = document.createElement("div");

element.classList.add("falling-item");

element.innerHTML = items[Math.floor(Math.random()*items.length)];

element.style.left = Math.random()*100 + "vw";

element.style.fontSize = (20 + Math.random()*25) + "px";

element.style.animationDuration = (5 + Math.random()*5) + "s";

document.body.appendChild(element);

setTimeout(()=>{
element.remove();
},10000);

}

setInterval(createFalling,300);

</script>
</body>
</html>
