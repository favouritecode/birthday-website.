<!DOCTYPE html>
<html>
<head>
<title>Our Story</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#1F3A93;
color:white;
font-family:Segoe UI;
text-align:center;
padding-top:120px;
}

.story{
max-width:700px;
margin:auto;
font-size:22px;
}

.falling-item{
position:fixed;
top:-10px;
font-size:22px;
pointer-events:none;
animation: fall linear forwards;
}

@keyframes fall{

0%{
transform: translateY(-10vh) rotate(0deg);
opacity:1;
}

100%{
transform: translateY(110vh) rotate(360deg);
opacity:0.8;
}

}


</style>
</head>

<body>

<h1>Our Story ❤️</h1>

<div class="story">

<p>
The day I met you, I didn't expect to like you this much, i wasn't even looking at you.
You brought laughter into my world and peace into my heart.

Every moment with you feels special.
And today I celebrate the amazing man you are.
<br>
click below
</p>

<a href="birthday.html" class="btn" 
   style="border-radius:50px; border:2px solid #4169E1; background:transparent; color: white; padding:15px 40px; font-size:20px; font-weight:bold;">
See Something Beautiful 📸
</a>

</div>

<script>

function createFalling(){

const items = ["❤️","🌸","💖","🌹","🌺","💐"];

let element = document.createElement("div");

element.classList.add("falling-item");

element.innerHTML = items[Math.floor(Math.random()*items.length)];

element.style.left = Math.random()*100 + "vw";

element.style.fontSize = (20 + Math.random()*25) + "px";

element.style.animationDuration = (5 + Math.random()*5) + "s";

document.body.appendChild(element);

setTimeout(()=>{
element.remove();
},10000);

}

setInterval(createFalling,300);

</script>
</body>
</html>
