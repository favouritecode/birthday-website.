<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday 🎂</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:#1F3A93;
color:white;
font-family:Segoe UI;
overflow:hidden;
}

h1{
font-size:70px;
}

.message{
max-width:700px;
font-size:22px;
margin:auto;
}

.confetti{
position:absolute;
width:10px;
height:10px;
animation: fall 4s linear infinite;
}

@keyframes fall{
from{transform:translateY(-100vh);}
to{transform:translateY(100vh);}
}

.falling-item{
position:fixed;
top:-10px;
font-size:22px;
pointer-events:none;
animation: fall linear forwards;
}

@keyframes fall{

0%{
transform: translateY(-10vh) rotate(0deg);
opacity:1;
}

100%{
transform: translateY(110vh) rotate(360deg);
opacity:0.8;
}

}

.gallery-img{
width:300px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
margin:15px;
transition:0.4s;
}
</style>

</head>

<body>

<div>

<h1>Happy Birthday My Darling 👑</h1>
<img src="img/WhatsApp Image 2026-03-12 at 1.38.43 PM.jpeg" alt="" class="gallery-img">

<p class="message">
May this new year bring you success, joy and endless love.

Thank you for being the amazing man you are and also a trouble maker.
Happy Birthday baby ❤️🎂

</p>
<br>
<button onclick="celebrate()" class="btn" 
   style="border-radius:50px; border:2px solid #4169E1; background:transparent; color: white; padding:15px 40px; font-size:20px; font-weight:bold;">
Celebrate 🎉
</button>

</div>

<script>

function celebrate(){

for(let i=0;i<150;i++){

let conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background="hsl("+Math.random()*360+",100%,50%)";

conf.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(conf);

}

}


function createFalling(){

const items = ["❤️","🌸","💖","🌹","🌺","💐"];

let element = document.createElement("div");

element.classList.add("falling-item");

element.innerHTML = items[Math.floor(Math.random()*items.length)];

element.style.left = Math.random()*100 + "vw";

element.style.fontSize = (20 + Math.random()*25) + "px";

element.style.animationDuration = (5 + Math.random()*5) + "s";

document.body.appendChild(element);

setTimeout(()=>{
element.remove();
},10000);

}

setInterval(createFalling,300);


</script>

</body>
</html>
